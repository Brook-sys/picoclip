name: Bug report
description: Report a reproducible PicoClip defect
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve PicoClip. For security vulnerabilities, do not continue here; use the private reporting link in the contact section.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest repeatable sequence, relevant configuration, and sanitized logs.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Linux
        - macOS
        - Windows
        - Container
        - Other
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I removed secrets, tokens, private paths, and personal data from this report.
          required: true
        - label: This is not a security vulnerability requiring private disclosure.
          required: true
